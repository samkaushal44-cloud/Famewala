<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

h2{color:#22c55e;}

p{margin:8px 0;}
</style>

<script>
function loadSuccess(){
  const id = localStorage.getItem("lastOrderId");
  const service = localStorage.getItem("orderService");
  const plan = localStorage.getItem("orderPlan");
  const price = localStorage.getItem("orderPrice");

  document.getElementById("data").innerHTML = `
    <p><b>Order ID:</b> ${id}</p>
    <p><b>Service:</b> ${service}</p>
    <p><b>Plan:</b> ${plan}</p>
    <p><b>Price:</b> ₹${price}</p>
    <p><b>Status:</b> Processing ⏳</p>
  `;
}
</script>

</head>
<body onload="loadSuccess()">

<div class="card">
  <h2>✅ Order Placed</h2>
  <div id="data"></div>
</div>

</body>
</html>
