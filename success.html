<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(45deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:350px;
}

h2 {
  color:green;
}

.btn {
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">
  <h2>✅ Order Placed</h2>

  <p id="details"></p>

  <button class="btn" onclick="goHome()">Back Home</button>
</div>

<script>
const id = localStorage.getItem("successOrderId");
const service = localStorage.getItem("successService");
const plan = localStorage.getItem("successPlan");
const price = localStorage.getItem("successPrice");

document.getElementById("details").innerHTML =
`<b>ID:</b> ${id}<br>
<b>${service}</b><br>
${plan}<br>
₹${price}`;

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
