<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

input{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  width:90%;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<h2>🔍 Track Your Order</h2>

<input id="orderId" placeholder="Enter Order ID">

<button onclick="trackOrder()">Track</button>

<div id="result"></div>

<script>

function trackOrder(){

  let id = document.getElementById("orderId").value.trim();

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let found = orders.find(o => o.id === id);

  if(!found){
    document.getElementById("result").innerHTML =
    "<div class='box'>❌ Order Not Found</div>";
    return;
  }

  let html = `
    <div class="box">
      <b>ID:</b> ${found.id}<br><br>

      <b>Service:</b> ${found.service}<br>
      <b>Plan:</b> ${found.plan}<br>
      <b>Price:</b> ₹${found.price}<br><br>

      <b>Status:</b> ${found.status}<br>
  `;

  if(found.loginEmail){
    html += `
      <hr>
      <h3>🎁 Login Details</h3>
      <b>Email:</b> ${found.loginEmail}<br>
      <b>Password:</b> ${found.loginPass}
    `;
  }

  html += `</div>`;

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
