<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#667eea,#764ba2);
    }

    .box {
      max-width: 300px;
      margin: 100px auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg,#ff416c,#ff4b2b);
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    localStorage.setItem("adminLogin","true");
    window.location="admin.html";
  } else alert("Wrong ❌");
}
</script>

</body>
</html>
