<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  max-width:320px;
  background:white;
  border-radius:16px;
  padding:18px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* TITLE */
h2{
  margin:0;
  font-size:18px;
}

/* ORDER TEXT */
.order{
  font-size:13px;
  margin:8px 0 12px;
}

/* QR */
.qr{
  width:180px;
  margin:10px auto;
}

/* UPI */
.upi{
  font-size:12px;
  margin-top:8px;
}

/* INFO */
.info{
  font-size:12px;
  margin:8px 0;
  color:#555;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:10px;
  font-size:13px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  font-size:14px;
}

</style>

<script src="script.js"></script>

</head>
<body onload="loadPayment()">

<div class="card">

  <h2>Complete Payment</h2>

  <div class="order" id="orderText"></div>

  <img id="qr" class="qr">

  <div class="upi">UPI ID: <b>8219503445-3@ybl</b></div>

  <div class="info">📌 Scan & Pay using GPay / PhonePe / Paytm</div>

  <input type="text" id="utr" placeholder="Enter UTR Number">

  <button onclick="submitOrder()">I Paid ✅</button>

</div>

</body>
</html>
