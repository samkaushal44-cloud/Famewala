<!DOCTYPE html>
<html>
<head>
<title>FameWala</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.track-btn{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
  font-size:13px;
}

/* SERVICE CARD */
.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  margin:12px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.left{
  display:flex;
  align-items:center;
}

.left img{
  width:40px;
  margin-right:10px;
}

.plan-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>🔥 FameWala</h2>

  <button onclick="goTrack()" class="track-btn">
    Track 🔍
  </button>
</div>

<!-- SERVICES -->

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/youtube-play.png">
    <div>
      <b>YouTube</b><br>
      <small>Grow your channel</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#ff416c,#ff4b2b)"
  onclick="openService('youtube')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/instagram-new.png">
    <div>
      <b>Instagram</b><br>
      <small>Boost followers</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#ff6a00,#ee0979)"
  onclick="openService('instagram')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/facebook.png">
    <div>
      <b>Facebook</b><br>
      <small>Connect people</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#396afc,#2948ff)"
  onclick="openService('facebook')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/telegram-app.png">
    <div>
      <b>Telegram</b><br>
      <small>Grow channel</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#00c6ff,#0072ff)"
  onclick="openService('telegram')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/netflix.png">
    <div>
      <b>Netflix</b><br>
      <small>Watch shows</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#ff0000,#8b0000)"
  onclick="openService('netflix')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/spotify.png">
    <div>
      <b>Spotify</b><br>
      <small>Music & podcasts</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#1db954,#0f9b0f)"
  onclick="openService('spotify')">Plans →</button>
</div>

<div class="card">
  <div class="left">
    <img src="https://img.icons8.com/color/48/amazon.png">
    <div>
      <b>Amazon Prime</b><br>
      <small>Movies & delivery</small>
    </div>
  </div>
  <button class="plan-btn" style="background:linear-gradient(45deg,#2193b0,#6dd5ed)"
  onclick="openService('prime')">Plans →</button>
</div>

<script src="script.js"></script>

</body>
</html>
