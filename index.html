<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FameWala</title>

<style>
body{
  font-family: Arial;
  background: #0f172a;
  margin:0;
  color:white;
}

.header{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  margin-bottom:12px;
  border-radius:16px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

.card img{
  width:40px;
}

.left{
  display:flex;
  gap:12px;
  align-items:center;
}

.title{
  font-size:16px;
  font-weight:bold;
}

.desc{
  font-size:12px;
  opacity:0.7;
}

.btn{
  padding:8px 16px;
  border-radius:20px;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* COLORS */
.youtube{background:linear-gradient(45deg,#ff416c,#ff4b2b);}
.instagram{background:linear-gradient(45deg,#ff6a00,#ee0979);}
.facebook{background:linear-gradient(45deg,#396afc,#2948ff);}
.telegram{background:linear-gradient(45deg,#00c6ff,#0072ff);}
.netflix{background:linear-gradient(45deg,#ff0000,#8b0000);}
.spotify{background:linear-gradient(45deg,#1db954,#0f9b0f);}
.prime{background:linear-gradient(45deg,#2193b0,#6dd5ed);}
.disney{background:linear-gradient(45deg,#373b44,#4286f4);}
</style>

<script src="script.js"></script>

</head>
<body>

<div class="header">🔥 FameWala</div>

<div class="container">

  <!-- YouTube -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
      <div>
        <div class="title">YouTube</div>
        <div class="desc">Grow your channel</div>
      </div>
    </div>
    <button class="btn youtube" onclick="openService('youtube')">Plans →</button>
  </div>

  <!-- Instagram -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
      <div>
        <div class="title">Instagram</div>
        <div class="desc">Boost followers</div>
      </div>
    </div>
    <button class="btn instagram" onclick="openService('instagram')">Plans →</button>
  </div>

  <!-- Facebook -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
      <div>
        <div class="title">Facebook</div>
        <div class="desc">Connect people</div>
      </div>
    </div>
    <button class="btn facebook" onclick="openService('facebook')">Plans →</button>
  </div>

  <!-- Telegram -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
      <div>
        <div class="title">Telegram</div>
        <div class="desc">Grow channel</div>
      </div>
    </div>
    <button class="btn telegram" onclick="openService('telegram')">Plans →</button>
  </div>

  <!-- Netflix -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732228.png">
      <div>
        <div class="title">Netflix</div>
        <div class="desc">Watch shows</div>
      </div>
    </div>
    <button class="btn netflix" onclick="openService('netflix')">Plans →</button>
  </div>

  <!-- Spotify -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png">
      <div>
        <div class="title">Spotify</div>
        <div class="desc">Music & podcasts</div>
      </div>
    </div>
    <button class="btn spotify" onclick="openService('spotify')">Plans →</button>
  </div>

  <!-- Prime -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
      <div>
        <div class="title">Amazon Prime</div>
        <div class="desc">Movies & delivery</div>
      </div>
    </div>
    <button class="btn prime" onclick="openService('prime')">Plans →</button>
  </div>

  <!-- Disney -->
  <div class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968779.png">
      <div>
        <div class="title">Disney+ Hotstar</div>
        <div class="desc">OTT content</div>
      </div>
    </div>
    <button class="btn disney" onclick="openService('disney')">Plans →</button>
  </div>

</div>

</body>
</html>
