<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#1e293b;
}

.logout-btn{
  background:red;
  border:none;
  padding:6px 12px;
  border-radius:10px;
  color:white;
}

/* CARD */
.order{
  background:#1e293b;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.status{
  margin-top:5px;
  font-size:13px;
  opacity:0.8;
}
</style>

<!-- 🔒 LOGIN PROTECTION -->
<script>
if(localStorage.getItem("adminLogin") !== "true"){
  window.location.href = "login.html";
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>Admin Panel 🔒</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- ORDERS -->
<div id="orders"></div>

<script>

// 🔥 LOAD ORDERS
function loadOrders(){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let html = "";

  if(orders.length === 0){
    html = "<p style='padding:15px'>No Orders 😅</p>";
  }

  orders.reverse().forEach(o => {
    html += `
      <div class="order">
        <b>ID:</b> ${o.id}<br>
        <b>${o.service}</b><br>
        ${o.plan}<br>
        ₹${o.price}<br>
        <div class="status">Status: ${o.status}</div>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

// 🔥 LOGOUT
function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "login.html";
}

// LOAD
loadOrders();

</script>

</body>
</html>
