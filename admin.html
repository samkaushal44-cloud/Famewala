<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e293b;
}

button{
  margin-top:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  font-size:12px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.deliver{background:#22c55e;color:white;}

.card{
  background:#1e293b;
  margin:10px;
  padding:12px;
  border-radius:12px;
}
</style>

<script>
if(localStorage.getItem("adminLogin") !== "true"){
  window.location.href = "login.html";
}
</script>

</head>

<body>

<div class="header">
  <h2>Admin Panel 🔒</h2>
  <button onclick="logout()">Logout</button>
</div>

<div id="orders"></div>

<script>

function loadOrders(){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let html = "";

  // 🔥 REVERSE WITHOUT BREAKING ID
  orders.slice().reverse().forEach(o => {

    html += `
    <div class="card">
      <b>ID:</b> ${o.id}<br>
      <b>${o.service}</b><br>
      ${o.plan}<br>
      ₹${o.price}<br>

      <b>User:</b> ${o.userInput || "-"}<br>
      <b>Email:</b> ${o.userEmail || "-"}<br>
      <b>UTR:</b> ${o.utr}<br>

      <b>Status:</b> ${o.status}<br>

      ${o.loginEmail ? `
        <hr>
        <b>Login Email:</b> ${o.loginEmail}<br>
        <b>Password:</b> ${o.loginPass}
      ` : ""}

      <br>

      <button class="approve" onclick="updateStatus('${o.id}','Completed ✅')">Approve</button>
      <button class="reject" onclick="updateStatus('${o.id}','Cancelled ❌')">Reject</button>
      <button class="deliver" onclick="deliver('${o.id}')">Deliver 🔑</button>

    </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

// 🔥 STATUS FIX
function updateStatus(id, status){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders = orders.map(o => {
    if(o.id === id){
      o.status = status;
    }
    return o;
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  location.reload();
}

// 🔥 DELIVER FIX
function deliver(id){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let email = prompt("Enter Login Email:");
  let pass = prompt("Enter Password:");

  if(!email || !pass){
    alert("Details required ❌");
    return;
  }

  orders = orders.map(o => {
    if(o.id === id){
      o.loginEmail = email;
      o.loginPass = pass;
      o.status = "Completed ✅";
    }
    return o;
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Delivered ✅");
  location.reload();
}

// 🔥 LOGOUT
function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "login.html";
}

loadOrders();

</script>

</body>
</html>
