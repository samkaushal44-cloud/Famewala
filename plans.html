<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plans</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

/* HEADER */
.header{
  padding:12px 15px;
  font-size:18px;
  font-weight:bold;
}

/* TOP BOX */
.box{
  margin:10px;
  padding:14px;
  border-radius:12px;
  font-size:14px;
  color:white;
}

/* PLAN CARD */
.plan-card{
  margin:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* TEXT */
.plan-card h3{
  font-size:14px;
  margin:0;
}

.plan-card p{
  font-size:11px;
  margin:2px 0;
  opacity:0.7;
}

/* BUTTON */
.plan-btn{
  padding:6px 12px;
  font-size:12px;
  border-radius:16px;
  background:#ff3b3b;
  border:none;
  color:white;
  font-weight:bold;
}

</style>

<script src="script.js"></script>

</head>
<body onload="loadPlans()">

<div class="header">🔥 FameWala</div>

<div class="box" id="serviceBox">
  <h3 id="serviceName">Loading...</h3>
  <p id="serviceDesc"></p>
</div>

<div id="plansContainer"></div>

</body>
</html>
